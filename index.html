<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player & Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'sans-serif';
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        #visualizer {
            width: 100%;
            height: 180px;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }
        input[type="range"] {
            accent-color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="glass p-6 w-full max-w-xl shadow-2xl">
        
        <!-- Now Playing Info (Minimized) -->
        <div class="mb-4 text-center min-h-[1.75rem]">
            <p id="file-name" class="text-sm font-medium truncate px-4 opacity-70"></p>
        </div>

        <!-- Visualizer -->
        <canvas id="visualizer" class="mb-6"></canvas>

        <div class="flex flex-col gap-5">
            <!-- Seek Bar -->
            <div class="flex items-center gap-3">
                <span id="current-time" class="text-xs w-10 text-right font-mono">0:00</span>
                <input id="seek-slider" type="range" min="0" value="0" step="0.1" class="flex-grow h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <span id="duration" class="text-xs w-10 font-mono">0:00</span>
            </div>

            <!-- Main Controls -->
            <div class="flex items-center justify-center gap-4 sm:gap-6 px-2">
                
                <!-- Left: Upload Icon Button (Expanded accept attribute) -->
                <label for="audio-upload" class="p-3 bg-gray-800 hover:bg-gray-700 rounded-full cursor-pointer transition-all border border-gray-600 group active:scale-95 shrink-0" title="ファイルをアップロード">
                    <svg class="w-5 h-5 text-sky-400 group-hover:text-sky-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <!-- Updated: allow most common audio formats -->
                    <input id="audio-upload" type="file" class="hidden" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac,.webm" />
                </label>

                <!-- Color Change Button -->
                <button id="theme-btn" class="p-3 bg-gray-800 hover:bg-gray-700 rounded-full cursor-pointer transition-all border border-gray-600 group active:scale-95 shrink-0" title="ビジュアル色を変更">
                    <svg class="w-5 h-5 text-purple-400 group-hover:text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                    </svg>
                </button>

                <!-- Center: Play/Pause Button -->
                <button id="play-btn" class="p-4 bg-sky-500 hover:bg-sky-400 rounded-full transition-all transform hover:scale-105 active:scale-90 shadow-lg shadow-sky-500/20 shrink-0">
                    <svg id="play-icon" class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                    <svg id="pause-icon" class="w-7 h-7 text-white hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                    </svg>
                </button>

                <!-- Right: Volume -->
                <div class="flex items-center gap-2 w-24 sm:w-28">
                    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path>
                    </svg>
                    <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.7" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
                
            </div>
        </div>

        <audio id="audio-element" class="hidden"></audio>
    </div>

    <script>
        const audioInput = document.getElementById('audio-upload');
        const themeBtn = document.getElementById('theme-btn');
        const audio = document.getElementById('audio-element');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const volumeSlider = document.getElementById('volume-slider');
        const seekSlider = document.getElementById('seek-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const fileNameEl = document.getElementById('file-name');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let source;
        let animationId;

        const themes = [
            { name: 'Sky', r: 56, g: 189, b: 248 },
            { name: 'Emerald', r: 16, g: 185, b: 129 },
            { name: 'Rose', r: 244, g: 63, b: 94 },
            { name: 'Amber', r: 245, g: 158, b: 11 },
            { name: 'Violet', r: 139, g: 92, b: 246 }
        ];
        let currentThemeIndex = 0;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            drawVisualizer();
        }

        audioInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                fileNameEl.textContent = file.name;
                fileNameEl.classList.remove('opacity-70');
                audio.load();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                initAudio();
            }
        });

        themeBtn.addEventListener('click', () => {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            themeBtn.style.borderColor = `rgba(${theme.r}, ${theme.g}, ${theme.b}, 0.5)`;
        });

        playBtn.addEventListener('click', () => {
            if (!audio.src) return;
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            if (audio.paused) {
                audio.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        audio.addEventListener('loadedmetadata', () => {
            seekSlider.max = audio.duration;
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            seekSlider.value = audio.currentTime;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        seekSlider.addEventListener('input', (e) => {
            audio.currentTime = e.target.value;
        });

        function drawVisualizer() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function render() {
                animationId = requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2;
                let barHeight;
                let x = 0;
                const theme = themes[currentThemeIndex];
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height;
                    const r = Math.min(255, theme.r + (i * 0.5));
                    const g = Math.min(255, theme.g + (i * 0.2));
                    const b = Math.min(255, theme.b + (i * 0.5));
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            }
            render();
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        window.addEventListener('resize', () => {
            if (analyser) {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
        });
    </script>
</body>
</html>
