<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player & Visualizer (Queue)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'sans-serif';
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        #visualizer {
            width: 100%;
            height: 150px;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }
        input[type="range"] {
            accent-color: #38bdf8;
        }
        .playlist-item.active {
            background-color: rgba(56, 189, 248, 0.2);
            border-color: rgba(56, 189, 248, 0.5);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="glass p-6 w-full max-w-xl shadow-2xl">
        
        <!-- Now Playing Info -->
        <div class="mb-4 text-center min-h-[1.75rem]">
            <p id="file-name" class="text-sm font-medium truncate px-4 text-sky-400"></p>
        </div>

        <!-- Visualizer -->
        <canvas id="visualizer" class="mb-6"></canvas>

        <div class="flex flex-col gap-5">
            <!-- Seek Bar -->
            <div class="flex items-center gap-3">
                <span id="current-time" class="text-xs w-10 text-right font-mono">0:00</span>
                <input id="seek-slider" type="range" min="0" value="0" step="0.1" class="flex-grow h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <span id="duration" class="text-xs w-10 font-mono">0:00</span>
            </div>

            <!-- Main Controls -->
            <div class="flex items-center justify-center gap-2 sm:gap-4 px-2">
                
                <!-- Upload Icon Button -->
                <label for="audio-upload" class="p-2.5 bg-gray-800 hover:bg-gray-700 rounded-full cursor-pointer transition-all border border-gray-600 group active:scale-95 shrink-0" title="キューに追加">
                    <svg class="w-5 h-5 text-sky-400 group-hover:text-sky-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <input id="audio-upload" type="file" class="hidden" accept="audio/*" multiple />
                </label>

                <!-- Color Change Button -->
                <button id="theme-btn" class="p-2.5 bg-gray-800 hover:bg-gray-700 rounded-full cursor-pointer transition-all border border-gray-600 group active:scale-95 shrink-0" title="色を変更">
                    <svg class="w-5 h-5 text-purple-400 group-hover:text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                    </svg>
                </button>

                <!-- Prev Button -->
                <button id="prev-btn" class="p-2.5 text-gray-400 hover:text-white transition-colors active:scale-90">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path>
                    </svg>
                </button>

                <!-- Play/Pause Button -->
                <button id="play-btn" class="p-4 bg-sky-500 hover:bg-sky-400 rounded-full transition-all transform hover:scale-105 active:scale-90 shadow-lg shadow-sky-500/20 shrink-0">
                    <svg id="play-icon" class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                    <svg id="pause-icon" class="w-7 h-7 text-white hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                    </svg>
                </button>

                <!-- Next Button -->
                <button id="next-btn" class="p-2.5 text-gray-400 hover:text-white transition-colors active:scale-90">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"></path>
                    </svg>
                </button>

                <!-- Right: Volume (Set to 0.33 initially) -->
                <div class="flex items-center gap-2 w-20 sm:w-24">
                    <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.33" class="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- Playlist Queue -->
            <div id="playlist-container" class="mt-2 bg-black/20 rounded-xl overflow-hidden hidden">
                <div id="playlist" class="max-h-40 overflow-y-auto p-1 space-y-1">
                    <!-- Items injected here -->
                </div>
            </div>
        </div>

        <audio id="audio-element" class="hidden"></audio>
    </div>

    <script>
        const audioInput = document.getElementById('audio-upload');
        const themeBtn = document.getElementById('theme-btn');
        const audio = document.getElementById('audio-element');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const seekSlider = document.getElementById('seek-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const fileNameEl = document.getElementById('file-name');
        const playlistEl = document.getElementById('playlist');
        const playlistContainer = document.getElementById('playlist-container');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // Set initial volume to match slider (approx 1/3)
        audio.volume = 0.33;

        let audioContext;
        let analyser;
        let source;
        let animationId;
        let queue = [];
        let currentIndex = -1;

        const themes = [
            { name: 'Sky', r: 56, g: 189, b: 248 },
            { name: 'Emerald', r: 16, g: 185, b: 129 },
            { name: 'Rose', r: 244, g: 63, b: 94 },
            { name: 'Amber', r: 245, g: 158, b: 11 },
            { name: 'Violet', r: 139, g: 92, b: 246 }
        ];
        let currentThemeIndex = 0;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            drawVisualizer();
        }

        // Add to Queue
        audioInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                files.forEach(file => {
                    const url = URL.createObjectURL(file);
                    queue.push({ name: file.name, url: url });
                });
                
                renderPlaylist();
                playlistContainer.classList.remove('hidden');

                if (currentIndex === -1) {
                    loadTrack(0);
                }
                initAudio();
            }
            audioInput.value = ''; // Reset for same file re-upload
        });

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            queue.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item flex items-center justify-between p-2 text-xs rounded-lg cursor-pointer transition-colors border border-transparent hover:bg-white/5 ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="truncate pr-4">${index + 1}. ${track.name}</span>
                    <button class="remove-btn text-gray-500 hover:text-red-400 p-1" data-index="${index}">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                item.onclick = (e) => {
                    if (e.target.closest('.remove-btn')) {
                        removeFromQueue(index);
                    } else {
                        loadTrack(index, true);
                    }
                };
                playlistEl.appendChild(item);
            });
        }

        function loadTrack(index, autoPlay = false) {
            if (index < 0 || index >= queue.length) return;
            
            currentIndex = index;
            audio.src = queue[currentIndex].url;
            fileNameEl.textContent = queue[currentIndex].name;
            audio.load();
            
            renderPlaylist();
            
            if (autoPlay) {
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
                audio.play();
                updatePlayIcons(true);
            } else {
                updatePlayIcons(false);
            }
        }

        function removeFromQueue(index) {
            queue.splice(index, 1);
            if (currentIndex === index) {
                if (queue.length > 0) {
                    loadTrack(index % queue.length, audio.paused === false);
                } else {
                    currentIndex = -1;
                    audio.src = '';
                    fileNameEl.textContent = '';
                    playlistContainer.classList.add('hidden');
                    updatePlayIcons(false);
                }
            } else if (currentIndex > index) {
                currentIndex--;
            }
            renderPlaylist();
        }

        function nextTrack() {
            if (queue.length === 0) return;
            let nextIndex = (currentIndex + 1) % queue.length;
            loadTrack(nextIndex, true);
        }

        function prevTrack() {
            if (queue.length === 0) return;
            let prevIndex = (currentIndex - 1 + queue.length) % queue.length;
            loadTrack(prevIndex, true);
        }

        function updatePlayIcons(isPlaying) {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        // Controls
        playBtn.addEventListener('click', () => {
            if (currentIndex === -1 && queue.length > 0) {
                loadTrack(0, true);
                return;
            }
            if (!audio.src) return;
            
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            
            if (audio.paused) {
                audio.play();
                updatePlayIcons(true);
            } else {
                audio.pause();
                updatePlayIcons(false);
            }
        });

        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        
        // Auto Next
        audio.addEventListener('ended', nextTrack);

        themeBtn.addEventListener('click', () => {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            themeBtn.style.borderColor = `rgba(${theme.r}, ${theme.g}, ${theme.b}, 0.5)`;
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        audio.addEventListener('loadedmetadata', () => {
            seekSlider.max = audio.duration;
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            seekSlider.value = audio.currentTime;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        seekSlider.addEventListener('input', (e) => {
            audio.currentTime = e.target.value;
        });

        function drawVisualizer() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function render() {
                animationId = requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2;
                let barHeight;
                let x = 0;
                const theme = themes[currentThemeIndex];
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * canvas.height;
                    const r = Math.min(255, theme.r + (i * 0.5));
                    const g = Math.min(255, theme.g + (i * 0.2));
                    const b = Math.min(255, theme.b + (i * 0.5));
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                    x += barWidth;
                }
            }
            render();
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        window.addEventListener('resize', () => {
            if (analyser) {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
        });
    </script>
</body>
</html>
